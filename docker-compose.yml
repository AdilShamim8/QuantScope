version: "3.8"
services:
  quantscope:
    build: .
    container_name: quantscope
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./output:/app/output
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3